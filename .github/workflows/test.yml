name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: ["stable", "1.88.0"]
    steps:
      - uses: actions/checkout@v4
      - run: rustup update ${{ matrix.rust }} && rustup default ${{ matrix.rust }}
      - run: cargo build
      - run: cargo test
